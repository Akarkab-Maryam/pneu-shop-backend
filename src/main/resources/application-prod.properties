# ===== BASE DE DONNÉES PostgreSQL (Production) =====
spring.datasource.url=jdbc:postgresql://VOTRE_HOTE_PROD:5432/pneushop_db
spring.datasource.username=VOTRE_USERNAME_PROD
spring.datasource.password=VOTRE_MOT_DE_PASSE_PROD
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / HIBERNATE POUR PostgreSQL =====
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ===== LOGS =====
logging.level.org.springframework=WARN
logging.level.com.pneushop=INFO